version: '3.8'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    networks:
      - app-network
    ports:
      - "3002:3002"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    ports:
      - "8083:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
